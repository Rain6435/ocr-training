workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: us-central1-docker.pkg.dev/ocr-training-491603/vertex-ai/ocr-classifier-training:latest
      args:
        - src.classifier.train_vertex
        - --gcs-bucket
        - ocr-data-70106
        - --gcs-data-prefix
        - data/difficulty_labels
        - --gcs-model-prefix
        - models/classifier
        - --epochs
        - "30"
        - --batch-size
        - "64"
